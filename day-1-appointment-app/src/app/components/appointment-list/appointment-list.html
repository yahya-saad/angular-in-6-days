<div class="container my-4">
  <div class="card shadow-sm p-4">
    <div class="row mb-3">
      <div class="col">
        <h2 class="text-center text-primary">Create New Appointment</h2>
      </div>
    </div>
    <div class="row align-items-end">
      <div class="col-md-6">
        <label for="title" class="form-label">Title</label>
        <input
          [(ngModel)]="newTitle"
          id="title"
          name="title"
          placeholder="Enter appointment title"
          class="form-control"
        />
      </div>
      <div class="col-md-4">
        <label for="date" class="form-label">Date</label>
        <input
          [(ngModel)]="newDate"
          type="date"
          id="date"
          name="date"
          class="form-control"
        />
      </div>
      <div class="col-md-2">
        <button class="btn btn-success w-100" (click)="addAppointment()">
          Add
        </button>
      </div>
    </div>
  </div>

  @if(!appointments.length){
  <h3 class="text-center mt-4">No appointments yet 📅</h3>
  }@else{
  <ul class="list-group mt-4">
    @for (item of appointments; track $index) {
    <li
      class="list-group-item d-flex justify-content-between align-items-center"
    >
      <div>
        <strong>{{ item.title }}</strong>
        <small class="text-muted ms-2">{{
          item.date | date : "MMM d, y"
        }}</small>
      </div>
      <button
        class="btn btn-sm btn-outline-danger"
        (click)="deleteAppointment($index)"
      >
        Delete
      </button>
    </li>
    }
  </ul>
  }
</div>
